apiVersion: v1
kind: Namespace
metadata:
  name: rca-test
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bitnami
  namespace: rca-test
spec:
  interval: 5m
  url: https://charts.bitnami.com/bitnami
---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: rca-test-app
  namespace: rca-test
spec:
  interval: 1m
  chart:
    spec:
      chart: nginx
      version: "15.14.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: rca-test
  values:
    image:
      tag: "1.25.3"
    replicaCount: 1
